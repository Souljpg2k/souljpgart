<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Souljpgart">
    <meta name="keywords" content="Souljpg">
    <meta name="author" content="Souljpg">
    <meta property="og:title" content="Souljpg">
    <meta property="og:description" content="Souljpgart">
    <meta name="google-site-verification" content="G5D3vjJzrw9uOnD10CHrOEyDzOnkOgTMmYHXVZcrEiw" />
    <title>Souljpg</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="main-overlay">
        <div>
            <div class="sidebar">
                <div class="sidebar-icons">
                    <a href="index.html" class="sidebar-home" aria-label="Home"></a>
                </div>
                <div class="lang-switch" aria-label="Language switcher">
                    <div class="lang-toggle" aria-expanded="false" aria-controls="lang-menu"
                        aria-label="Open language menu">
                        <img src="img/language-solid-full.svg" alt="language">
                    </div>

                    <div id="lang-menu" class="lang-menu" hidden>
                        <button class="lang-btn" data-lang="th" aria-pressed="false">ไทย</button>
                        <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
                    </div>
                </div>
            </div>

            <div class="content-container">
                <div class="window-controls">
                    <img id="minimizeBtn" src="img/minus.svg" alt="Minimize" role="button" tabindex="0"
                        aria-pressed="false" aria-label="Minimize content">
                    <img id="closeBtn" src="img/x.svg" alt="Close" role="button" tabindex="0"
                        aria-label="Close content">
                </div>

                <div class="social-links" aria-label="social links">
                    <a href="https://x.com/souljpg_">
                        <img src="img/x-twitter.svg" alt="Twitter">
                    </a>
                    <a href="https://www.pixiv.net/en/users/73130815">
                        <img src="img/pixiv-brands-solid-full.svg" alt="Pixiv">
                    </a>
                    <a href="https://www.artstation.com/ctrlsky123">
                        <img src="img/artstation.svg" alt="ArtStation">
                    </a>
                </div>
                <main class="profile-section">
                    <div class="logo">
                        <h1>SOULJPG</h1>
                    </div>

                    <div class="text">
                        <h1 data-i18n="welcome_title">WELCOME</h1>
                        <p data-i18n="welcome_sub">to the website!</p>
                    </div>

                    <div class="info-card">
                        <div class="title">
                            <h2 data-i18n="about_title">About</h2>
                        </div>
                        <div class="card-content">
                            <p data-i18n="about_role">Soul illustrator & concept artist.</p>
                            <p data-i18n="about_tools">Tools Clip Studio Paint & Blender.</p>
                            <p class="ab" data-i18n="about_draw">I draw backgrounds & illustrations.</p>
                        </div>
                    </div>
                </main>
                <div class="media-player">
                    <div class="play-button">
                        <img src="img/play.svg" alt="playimg">
                        <span data-i18n="play">play</span>
                    </div>
                    <div class="shop-button">
                        <a href="https://www.inprnt.com/profile/skyxsxx/">
                            <img src="img/shoppin.svg" alt="Shopping">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="background-blur"></div>
    <script src="script.js"></script>
</body>

</html>
