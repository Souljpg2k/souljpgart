<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Souljpgart">
    <meta name="keywords" content="Souljpg">
    <meta name="author" content="Souljpg">
    <meta property="og:title" content="Souljpg">
    <meta property="og:description" content="Souljpgart">
    <meta name="google-site-verification" content="G5D3vjJzrw9uOnD10CHrOEyDzOnkOgTMmYHXVZcrEiw" />
    <title>Souljpg</title>
    <link rel="icon" type="img/favicon.ico" href="img/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="site-header">
            <div class="logo-wrapper">
                <a href="index.html">
                    <img src="img/Logo.png" alt="SOULJPG">
                </a>
            </div>
            <div class="social-link-wrapper">
                <a href="https://ko-fi.com/soul111">
                    <img src="img/kofi_symbol.png" alt="Ko-fi">
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="profile-section">
                <div class="info-box">
                    <p class="info-title">About</p>
                    <p>i'm Soul Illustrator & Concept art</p>
                </div>
                <div class="info-box">
                    <p class="info-title">Tools</p>
                    <p>Software used Clip studio Paint & Blender</p>
                </div>
                <footer>&copy;2025 Souljpg</footer>
            </div>
            <div class="twitter-feed">
                <blockquote class="twitter-tweet">
                    <p lang="en" dir="ltr">Dream <a href="https://t.co/Tq8dlUmrQB">pic.twitter.com/Tq8dlUmrQB</a></p>
                    &mdash; Soul (@souljpg_) <a
                        href="https://twitter.com/souljpg_/status/1908477056503222721?ref_src=twsrc%5Etfw">April 5,
                        2025</a>
                </blockquote>
                <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
            </div>
            <div class="content-row">
                <div class="blog-toggle" tabindex="0">
                    <div class="blog-container">
                        <div class="blog-icon-wrapper">
                            <img src="img/book.svg" alt="blog">
                        </div>
                        <div class="blog-content">
                            <p class="blog-title">Blog</p>
                            <p>Favorite brush</p>
                            <p>It's a very good cloud brush.</p>
                            <a href="https://assets.clip-studio.com/en-us/detail?id=1712701">
                                <img src="img/brush.jpg" alt="Cloud brush">
                            </a>
                            <div>
                                <p>Main brush</p>
                                <a href="https://assets.clip-studio.com/en-us/detail?id=1842027">
                                    <img src="img/brush2.jpg" alt="Main brush">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="shop-link-wrapper">
                    <div class="shop-icon">
                        <a href="https://www.inprnt.com/profile/skyxsxx/">
                            <img src="img/shop.png" alt="shop">
                        </a>
                    </div>
                </div>
            </div>

            <div class="gallery-wrapper">
                <div class="gallery-trigger">
                    <img src="img/1.png" onmouseover="this.src='img/2.png'" onmouseout="this.src='img/1.png'"
                        alt="Open Gallery">
                </div>

                <div class="gallery-overlay" id="gallery-overlay">
                    <div class="gallery-grid" id="gallery-grid">
                        <img src="img/dream542568.jpg" alt="Gallery Image 1">
                        <img src="img/CS1.jpg" alt="Gallery Image 2">
                        <img src="img/20102568.jpg" alt="Gallery Image 3">
                        <img src="img/nurse.png" alt="Gallery Image 4">
                        <img src="img/Snow.jpg" alt="Gallery Image 5">
                        <img src="img/lapart.jpg" alt="Gallery Image 6">
                        <img src="img/2572568.jpg" alt="Gallery Image 7">
                        <img src="img/snoww.jpg" alt="Gallery Image 8">
                    </div>
                </div>
            </div>

            <div id="lightbox">
                <img id="lightbox-img" src="" alt="Lightbox Image">
            </div>
        </main>

        <div class="background-image">
            <img src="img/snoww.jpg" alt="Background">
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
